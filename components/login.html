<div class="login-container">
  <div class="login-card-minimal p-4">
    <div class="text-center">
      <div class="brand-circle mx-auto"><i class="bi bi-arrow-through-heart-fill"></i></div>
      <h1 class="greeting-text">growthogether</h1>
      <p class="sub-greeting">jalan bareng, mimpi nyata</p>
    </div>
    <div>
      <label>siapa yang masuk?</label>
      <select id="loginUser" class="uniform-control">
        <option value="FACHMI">✨ Fachmi</option>
        <option value="AZIZAH">🌸 Azizah</option>
      </select>
    </div>
    <div class="mt-3">
      <label>kata sandi</label>
      <input type="password" id="loginPass" class="uniform-control" placeholder="Masukkan password">
    </div>
    <button onclick="handleLogin()" class="login-btn w-100 mt-4">Masuk</button>
    <div id="loginErrorMsg" class="login-feedback mt-2" style="display:none">
      <i class="bi bi-exclamation-triangle-fill"></i> <span id="errorText"></span>
    </div>
    <div id="loginLoader" style="display:none" class="text-center mt-2">
      <div class="loader-mini"></div>
    </div>
  </div>
</div>
