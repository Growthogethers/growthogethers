<!-- FILE BARU: components/notification-modals.html -->
<!-- Notification Permission Modal -->
<div class="modal fade" id="notificationPermissionModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content rounded-4">
      <div class="modal-header border-0 bg-gradient bg-primary text-white">
        <h5 class="fw-bold mb-0"><i class="bi bi-bell-fill me-2"></i>Izinkan Notifikasi</h5>
      </div>
      <div class="modal-body text-center p-4">
        <i class="bi bi-bell-slash fs-1 text-muted mb-3"></i>
        <p>Aktifkan notifikasi untuk mendapatkan pengingat rencana dan update penting dari pasangan!</p>
        <button onclick="window.requestNotificationPermission()" class="btn btn-primary w-100 rounded-pill">
          <i class="bi bi-check-circle me-2"></i>Izinkan Notifikasi
        </button>
        <button onclick="window.dismissNotificationModal()" class="btn btn-link text-muted mt-2">Nanti Saja</button>
      </div>
    </div>
  </div>
</div>

<!-- Real-time Notification Toast -->
<div class="realtime-toast" id="realtimeToast" style="display:none; position: fixed; top: 70px; right: 16px; z-index: 10000; max-width: 350px;">
  <div class="card border-0 shadow-lg rounded-4" style="background: linear-gradient(135deg, #667eea, #764ba2);">
    <div class="card-body p-3 text-white">
      <div class="d-flex gap-2 align-items-start">
        <i class="bi bi-bell-fill fs-4"></i>
        <div class="flex-grow-1">
          <strong id="realtimeToastTitle">Notifikasi</strong>
          <p class="mb-0 small" id="realtimeToastMessage"></p>
          <small id="realtimeToastTime" class="opacity-75"></small>
        </div>
        <button onclick="window.hideRealtimeToast()" class="btn-close btn-close-white"></button>
      </div>
    </div>
  </div>
</div>
