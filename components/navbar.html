<!-- Toast Notification -->
<div class="toast-notif" id="customToast" style="display: none" role="alert" aria-live="polite">
  <div class="toast align-items-center border-0 text-bg-dark">
    <div class="d-flex">
      <div class="toast-body" id="toastMessage"></div>
      <button type="button" class="btn-close btn-close-white me-2" onclick="window.hideToast()" aria-label="Tutup"></button>
    </div>
  </div>
</div>

<style>
  /* Skip link styling */
  .skip-link:focus {
    top: 0;
  }
  
  /* Chat FAB mobile adjustment */
  @media (max-width: 768px) {
    .chat-fab {
      bottom: 90px;
      right: 16px;
      width: 48px;
      height: 48px;
    }
    .chat-fab i {
      font-size: 1.5rem;
    }
  }
  
  /* Toast animation */
  @keyframes slideInUp {
    from {
      transform: translateY(100%);
      opacity: 0;
    }
    to {
      transform: translateY(0);
      opacity: 1;
    }
  }
  
  .toast-notif {
    animation: slideInUp 0.3s ease-out;
  }
  
  /* Touch feedback */
  .bottom-nav-item:active,
  .dark-mode-fab:active,
  .menu-toggle-hp:active,
  .chat-fab:active {
    transform: scale(0.95);
    transition: transform 0.1s ease;
  }
  
  /* Loading spinner animation */
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  
  .loading-spinner {
    animation: spin 0.8s linear infinite;
  }
</style>
